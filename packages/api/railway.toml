# Railway Service Configuration: API Server
# Service name: forj-api

[build]
builder = "NIXPACKS"
# Build from monorepo root to access all workspaces
buildCommand = "npm install && npm run build -w packages/shared && npm run build -w packages/api"

[deploy]
startCommand = "npm run start -w packages/api"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"

[[deploy.environmentVariables]]
name = "HOST"
value = "0.0.0.0"

[[deploy.environmentVariables]]
name = "PORT"
value = "3000"
