# Nixpacks Configuration for Forj Monorepo
# Ensures proper Node.js version and npm workspace support

[phases.setup]
nixPkgs = ["nodejs-18_x", "npm-9_x"]

# Skip install phase - buildCommand handles npm install for workspaces
[phases.install]
cmds = []

[phases.build]
# Build command is specified per-service in packages/*/railway.toml
cmds = []
